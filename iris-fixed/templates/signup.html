<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS – Sign Up</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
.auth-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 72px 20px 40px;
  background: var(--bg);
}
.auth-card {
  width: 100%;
  max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  box-shadow: var(--sh-lg);
  padding: 40px;
}
.auth-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}
.auth-logo-icon {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.auth-logo-text { font-size: 18px; font-weight: 700; color: var(--text); }
.auth-logo-sub  { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: .5px; font-weight: 500; }

.auth-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.auth-sub   { font-size: 13px; color: var(--text-2); margin-bottom: 28px; line-height: 1.5; }

.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: 11.5px; font-weight: 600;
  color: var(--text-2); text-transform: uppercase; letter-spacing: .5px;
  margin-bottom: 6px;
}
.form-group input {
  width: 100%; background: var(--surface-alt);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 9px 12px; font-size: 13.5px;
  font-family: 'Inter', sans-serif; color: var(--text); outline: none;
  box-sizing: border-box;
  transition: border-color .12s, box-shadow .12s;
}
.form-group input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(9,105,218,.12);
}
.form-group input::placeholder { color: var(--text-3); }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.auth-btn {
  width: 100%; padding: 11px; background: var(--accent);
  color: #fff; border: none; border-radius: var(--r-md);
  font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif;
  cursor: pointer; margin-top: 4px;
  transition: background .12s, box-shadow .12s;
  box-shadow: 0 1px 4px rgba(9,105,218,.3);
}
.auth-btn:hover { background: var(--accent-hover); box-shadow: var(--sh-md); }
.auth-btn:disabled { opacity: .6; cursor: not-allowed; }

.auth-error {
  background: var(--red-bg); color: var(--red);
  border: 1px solid #f5c1c1; border-radius: var(--r);
  padding: 9px 12px; font-size: 13px; font-weight: 500;
  margin-bottom: 14px; display: none;
}
.auth-error.show { display: block; }

.auth-success {
  background: #eafbf0; color: #1a7f4b;
  border: 1px solid #a7e3c0; border-radius: var(--r);
  padding: 9px 12px; font-size: 13px; font-weight: 500;
  margin-bottom: 14px; display: none;
  text-align: center;
}
.auth-success.show { display: block; }

.auth-footer {
  text-align: center;
  margin-top: 22px;
  font-size: 13px;
  color: var(--text-2);
}
.auth-footer a {
  color: var(--accent);
  font-weight: 600;
  text-decoration: none;
}
.auth-footer a:hover { text-decoration: underline; }

.divider {
  display: flex; align-items: center; gap: 10px;
  margin: 20px 0; color: var(--text-3); font-size: 12px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border-soft);
}

.strength-bar {
  height: 4px; border-radius: 2px;
  background: var(--border-soft);
  margin-top: 6px; overflow: hidden;
}
.strength-fill {
  height: 100%; width: 0; border-radius: 2px;
  transition: width .25s, background .25s;
}

@media(max-width: 480px) {
  .auth-card { padding: 28px 20px; }
  .form-row  { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon">
      <img src="{{ url_for('static', filename='images/national-emblem.svg') }}" alt="National Emblem">
    </div>
    <div>
      <div class="nav-logo-text">IRIS</div>
      <div class="nav-logo-sub">
        Environmental Intelligence
        <div class="nav-logo-sub-tricolour">भारत सरकार</div>
      </div>
    </div>
  </a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/aqi">AQI</a>
    <a href="/water">Water Quality</a>
    <a href="/noise">Noise</a>
    <a href="/emissions">Emissions</a>

    <div id="nav-auth-zone"></div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo-icon">🌍</div>
      <div>
        <div class="auth-logo-text">IRIS</div>
        <div class="auth-logo-sub">Environmental Intelligence</div>
      </div>
    </div>

    <div class="auth-title">Create your account</div>
    <div class="auth-sub">Join IRIS to monitor environmental data across India.</div>

    <div class="auth-error" id="signup-error"></div>
    <div class="auth-success" id="signup-success">🎉 Account created! Redirecting to login…</div>

    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" id="first-name" placeholder="Rahul" autocomplete="given-name">
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" id="last-name" placeholder="Sharma" autocomplete="family-name">
      </div>
    </div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="rahul_sharma" autocomplete="username">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="rahul@example.com" autocomplete="email" required>
    </div>

    <div class="form-group">
      <label>Select Role</label>
      <select id="role" style="width: 100%; background: var(--surface-alt); border: 1px solid var(--border); border-radius: var(--r); padding: 9px 12px; font-size: 13.5px; font-family: 'Inter', sans-serif; color: var(--text); outline: none; box-sizing: border-box; transition: border-color .12s, box-shadow .12s; cursor: pointer;" onchange="updateRegionFields()">
        <option value="citizen">Citizen</option>
        <option value="industry_user">Industry User</option>
        <option value="monitoring_team">Monitoring Team</option>
        <option value="regional_officer">Regional Officer</option>
        <option value="super_admin">Super Admin</option>
      </select>
    </div>

    <!-- Region & District (only for non-citizen roles) -->
    <div id="region-section" style="display: none;">
      <div class="form-group">
        <label>Select State *</label>
        <select id="state" style="width: 100%; background: var(--surface-alt); border: 1px solid var(--border); border-radius: var(--r); padding: 9px 12px; font-size: 13.5px; font-family: 'Inter', sans-serif; color: var(--text); outline: none; box-sizing: border-box; transition: border-color .12s, box-shadow .12s; cursor: pointer;" onchange="updateDistrictFields()">
          <option value="">Choose a State</option>
        </select>
      </div>
      <div class="form-group" id="district-group" style="display: none;">
        <label>Select District *</label>
        <select id="district" style="width: 100%; background: var(--surface-alt); border: 1px solid var(--border); border-radius: var(--r); padding: 9px 12px; font-size: 13.5px; font-family: 'Inter', sans-serif; color: var(--text); outline: none; box-sizing: border-box; transition: border-color .12s, box-shadow .12s; cursor: pointer;">
          <option value="">Choose a District</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 6 characters"
        autocomplete="new-password" oninput="checkStrength(this.value)">
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Repeat password"
        autocomplete="new-password" onkeydown="if(event.key==='Enter') doSignup()">
    </div>

    <button class="auth-btn" id="signup-btn" onclick="doSignup()">Create Account</button>

    <div class="divider">or</div>

    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>

  </div>
</div>

<script>
let stateDistrictHierarchy = {};

// Load state-district hierarchy
async function loadHierarchy() {
  try {
    const res = await fetch('/static/data/state-district-hierarchy.json');
    stateDistrictHierarchy = await res.json();
    populateStates();
  } catch (e) {
    console.error('Error loading hierarchy:', e);
  }
}

function populateStates() {
  const stateSelect = document.getElementById('state');
  const states = Object.keys(stateDistrictHierarchy).sort();
  states.forEach(state => {
    const option = document.createElement('option');
    option.value = state;
    option.textContent = state;
    stateSelect.appendChild(option);
  });
}

function updateDistrictFields() {
  const state = document.getElementById('state').value;
  const role = document.getElementById('role').value;
  const districtGroup = document.getElementById('district-group');
  const districtSelect = document.getElementById('district');
  
  districtSelect.innerHTML = '<option value="">Choose a District</option>';
  
  // For Super Admin, never show district group
  if (role === 'super_admin') {
    districtGroup.style.display = 'none';
    return;
  }
  
  if (!state) {
    districtGroup.style.display = 'none';
    return;
  }
  
  districtGroup.style.display = 'block';
  const districts = stateDistrictHierarchy[state]?.districts || [];
  districts.forEach(district => {
    const option = document.createElement('option');
    option.value = district;
    option.textContent = district;
    districtSelect.appendChild(option);
  });
}

function updateRegionFields() {
  const role = document.getElementById('role').value;
  const regionSection = document.getElementById('region-section');
  const districtGroup = document.getElementById('district-group');
  
  if (role === 'citizen') {
    regionSection.style.display = 'none';
  } else {
    regionSection.style.display = 'block';
    // For Super Admin, hide district as they manage entire state
    if (role === 'super_admin') {
      districtGroup.style.display = 'none';
    } else {
      districtGroup.style.display = 'block';
    }
  }
}

function checkStrength(pw) {
  const fill = document.getElementById('strength-fill');
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const pct = (score / 5) * 100;
  const colors = ['#f87171','#fb923c','#facc15','#4ade80','#22c55e'];
  fill.style.width = pct + '%';
  fill.style.background = colors[Math.min(score - 1, 4)] || '#f87171';
}

async function doSignup() {
  const first    = document.getElementById('first-name').value.trim();
  const last     = document.getElementById('last-name').value.trim();
  const username = document.getElementById('username').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm-password').value;
  const role     = document.getElementById('role').value;

  clearMessages();

  if (!username) { showError('Please choose a username.'); return; }
  if (!email) { showError('Email is required.'); return; }
  if (!email.includes('@')) { showError('Please enter a valid email address.'); return; }
  if (!password) { showError('Please enter a password.'); return; }
  if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }
  if (password !== confirm) { showError('Passwords do not match.'); return; }

  const full_name = [first, last].filter(Boolean).join(' ') || username;
  const state = document.getElementById('state').value;
  const district = document.getElementById('district').value;

  // Validate state and district for non-citizen roles
  if (role !== 'citizen') {
    if (!state) { showError('Please select a state.'); return; }
    // District is only required for non-super-admin roles
    if (role !== 'super_admin' && !district) { showError('Please select a district.'); return; }
  }

  const btn = document.getElementById('signup-btn');
  btn.disabled = true; btn.textContent = 'Creating account…';

  try {
    const res  = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, full_name, email, role, state, district })
    });
    const data = await res.json();

    if (!res.ok || data.error) {
      showError(data.error || 'Something went wrong. Please try again.');
      btn.disabled = false; btn.textContent = 'Create Account';
      return;
    }

    window.location.href = `/verify-email?user_id=${data.user.id}&email=${encodeURIComponent(email)}`;

  } catch(e) {
    showError('Connection error. Please try again.');
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}

function showError(msg) {
  const el = document.getElementById('signup-error');
  el.textContent = msg; el.classList.add('show');
}

function clearMessages() {
  document.getElementById('signup-error').classList.remove('show');
  document.getElementById('signup-success').classList.remove('show');
}
</script>
<script src="/static/js/iris-nav.js?v=20260314"></script>
<script>
  // Initialize hierarchy loading on page load
  document.addEventListener('DOMContentLoaded', loadHierarchy);
</script>
</body>
</html>
